<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080705">
<title>לוח שנה למשניות משפחת זלצמן</title>
<style>
:root{
  --bg:#070705;--bg2:#100d09;--panel:#17120d;--panel2:#21190f;--card:#19140e;
  --text:#f7ecd4;--muted:#bdae8d;--line:#3b2f1d;--gold:#d7b264;--gold2:#f1dda3;
  --ok:#48c987;--danger:#d87575;--shadow:0 24px 70px rgba(0,0,0,.42);--radius:24px;
}
body.light{
  --bg:#f6efe3;--bg2:#fff9ef;--panel:#fff8ec;--panel2:#ffffff;--card:#fffaf1;
  --text:#21180d;--muted:#766a5a;--line:#e4d3b9;--gold:#8e6425;--gold2:#b98537;
  --shadow:0 18px 45px rgba(74,50,16,.13);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;min-height:100vh;color:var(--text);
  background:
    radial-gradient(circle at 18% 8%,rgba(215,178,100,.18),transparent 26%),
    radial-gradient(circle at 84% 4%,rgba(241,221,163,.14),transparent 28%),
    linear-gradient(180deg,var(--bg2),var(--bg));
  font-family:Arial,"Noto Sans Hebrew",sans-serif;
}
button,input,select{font:inherit}
button{cursor:pointer}
.hide{display:none!important}
.muted{color:var(--muted)}
.intro{
  position:fixed;inset:0;z-index:9999;display:grid;place-items:center;
  background:radial-gradient(circle at 50% 22%,rgba(215,178,100,.34),transparent 30%),#060503;
  animation:introOut .65s ease 2.4s forwards;
}
.intro-card{text-align:center;padding:38px;animation:introIn 1s cubic-bezier(.2,.8,.2,1)}
.intro-mark{width:86px;height:86px;border-radius:28px;border:1px solid rgba(241,221,163,.42);display:grid;place-items:center;margin:0 auto 18px;color:var(--gold2);font-size:37px;box-shadow:0 0 55px rgba(215,178,100,.23)}
.intro h1{font-size:clamp(28px,5vw,54px);margin:0 0 10px;letter-spacing:-.7px}
.intro p{margin:0;color:#e8d7b1;font-size:18px}
@keyframes introIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
@keyframes introOut{to{opacity:0;visibility:hidden}}

.site-header{
  position:sticky;top:0;z-index:90;border-bottom:1px solid var(--line);
  background:rgba(10,8,5,.86);backdrop-filter:blur(18px);
}
body.light .site-header{background:rgba(255,248,236,.88)}
.header-inner{
  max-width:1280px;margin:auto;padding:12px 22px;display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:center;
}
.brand h1{margin:0;font-size:21px;line-height:1.25}
.brand small{display:block;color:var(--muted);margin-top:4px}
.tabs{justify-self:center;display:flex;gap:8px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:6px}
.tab{
  border:0;background:transparent;color:var(--muted);padding:10px 16px;border-radius:14px;
  transition:.18s ease;white-space:nowrap;
}
.tab.active,.tab:hover{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1f1609}
.date-time{
  justify-self:left;direction:rtl;text-align:right;color:var(--text);
  border:1px solid rgba(215,178,100,.33);border-radius:18px;padding:10px 14px;
  background:linear-gradient(135deg,rgba(215,178,100,.12),rgba(255,255,255,.035));
  box-shadow:0 10px 30px rgba(0,0,0,.16);white-space:nowrap;
}
.date-time b{color:var(--gold2);font-size:18px}
.date-time small{display:block;color:var(--muted);font-size:12px;margin-top:2px}
.app{max-width:1280px;margin:auto;padding:22px}
.page{display:none}
.page.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.home-hero{
  min-height:520px;display:grid;grid-template-columns:1fr 390px;gap:22px;align-items:stretch;
}
.home-main{
  position:relative;overflow:hidden;border:1px solid var(--line);border-radius:34px;padding:44px;
  background:
    radial-gradient(circle at 12% 14%,rgba(215,178,100,.23),transparent 27%),
    linear-gradient(145deg,rgba(255,255,255,.05),rgba(255,255,255,.018));
  box-shadow:var(--shadow);
  display:flex;flex-direction:column;justify-content:center;
}
.home-main:before{
  content:"";position:absolute;inset:auto -80px -110px auto;width:360px;height:360px;border-radius:50%;
  background:radial-gradient(circle,rgba(241,221,163,.13),transparent 68%);
}
.home-kicker{color:var(--gold2);letter-spacing:.8px;font-size:15px;margin-bottom:12px}
.home-main h2{font-size:clamp(36px,5vw,66px);line-height:1.05;margin:0 0 18px;letter-spacing:-1.2px}
.home-learning{font-size:clamp(23px,3vw,35px);line-height:1.55;color:var(--gold2);margin:0 0 18px;max-width:850px}
.home-meta{font-size:17px;color:var(--muted);line-height:1.7;margin-bottom:8px}
.home-side{
  border:1px solid var(--line);border-radius:34px;padding:22px;background:rgba(255,255,255,.035);box-shadow:var(--shadow);
}
.home-side h3{margin:0 0 6px;font-size:22px}
.panel,.card,.month{
  background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
}
.panel{padding:22px}
.panel h3{margin:0 0 14px;font-size:22px}
.meta{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 0}
.pill{border:1px solid var(--line);border-radius:999px;padding:7px 12px;color:var(--muted);background:rgba(255,255,255,.035)}
.btn{
  border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--text);border-radius:15px;
  padding:11px 15px;transition:.17s ease;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;
}
.btn:hover{transform:translateY(-1px);border-color:rgba(215,178,100,.55)}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1f1609;border-color:transparent;font-weight:700}
.btn.danger{border-color:rgba(216,117,117,.45);color:#ffd0d0}
.actions-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{padding:15px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.035);text-align:center}
.stat b{display:block;font-size:24px;color:var(--gold2)}
.stat span{color:var(--muted);font-size:13px}
.progress{height:12px;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:14px 0}
.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:.25s}
.toolbar{display:grid;grid-template-columns:1fr auto;gap:12px;margin:18px 0}
.search,input,select{
  border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--text);border-radius:15px;padding:12px 14px;outline:0;
}
select option{color:#111}
.month{padding:18px;margin-bottom:18px}
.month-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.month-head h3{margin:0;font-size:22px;color:var(--gold2)}
.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.card{padding:17px;box-shadow:none}
.card.today{border-color:rgba(215,178,100,.9);box-shadow:0 0 0 1px rgba(215,178,100,.3),0 14px 38px rgba(0,0,0,.18)}
.card.done{background:rgba(72,201,135,.09);border-color:rgba(72,201,135,.42)}
.card h4{margin:0 0 8px;font-size:17px}
.card p{margin:0;color:var(--muted);line-height:1.55}
.card .mini{font-size:13px;color:var(--muted);margin-top:8px}
.card-buttons{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.small{font-size:13px;padding:8px 10px;border-radius:12px}

.year-map{display:grid;grid-template-columns:repeat(14,1fr);gap:6px;margin-top:12px}
.dot{
  aspect-ratio:1;border-radius:7px;background:rgba(255,255,255,.09);border:1px solid var(--line);
  transition:.15s ease;position:relative;
}
.dot:hover{transform:scale(1.18);border-color:var(--gold2)}
.dot.done{background:var(--ok);border-color:transparent}
.dot.today{background:var(--gold2);border-color:transparent;box-shadow:0 0 0 2px rgba(215,178,100,.25)}
.dot:after{
  content:attr(data-tip);position:absolute;left:50%;bottom:120%;transform:translateX(-50%);
  background:#111;color:#fff;border:1px solid #574529;border-radius:12px;padding:9px 11px;font-size:12px;
  white-space:pre-line;line-height:1.55;min-width:210px;max-width:280px;text-align:right;
  opacity:0;pointer-events:none;transition:.12s;z-index:4;
}
.dot:hover:after{opacity:1}

.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.form-row{display:grid;gap:6px}
.form-row label{color:var(--muted)}
.toast{
  position:fixed;bottom:22px;left:22px;z-index:99999;background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#1d1408;border-radius:16px;padding:13px 18px;box-shadow:0 16px 40px rgba(0,0,0,.28);font-weight:700;opacity:0;transform:translateY(12px);pointer-events:none;transition:.25s ease;
}
.toast.show{opacity:1;transform:none}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:1000;display:none;place-items:center;padding:18px}
.modal.open{display:grid}
.modal-box{width:min(780px,100%);max-height:86vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow);padding:22px}
.modal-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}
.modal-head h2{margin:0}
.close{border:1px solid var(--line);background:transparent;color:var(--text);border-radius:14px;width:42px;height:42px;font-size:24px}
@media(max-width:1050px){
  .header-inner{grid-template-columns:1fr;gap:10px}
  .date-time{justify-self:stretch;text-align:center}
  .tabs{justify-self:stretch;overflow:auto;justify-content:flex-start}
  .home-hero{grid-template-columns:1fr}
  .cards{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:680px){
  .header-inner{padding:10px 12px}
  .brand h1{font-size:16px;text-align:center}
  .brand small{text-align:center}
  .tab{padding:9px 12px;font-size:13px}
  .app{padding:12px}
  .home-main{padding:24px;border-radius:26px;min-height:390px}
  .home-side{border-radius:24px}
  .home-main h2{font-size:29px}
  .home-learning{font-size:21px}
  .panel{padding:16px}
  .cards,.stats,.form-grid,.toolbar{grid-template-columns:1fr}
  .year-map{grid-template-columns:repeat(10,1fr)}
  .btn,input,select{width:100%;min-height:44px}
  .actions-row,.card-buttons{display:grid;grid-template-columns:1fr;gap:8px}
  .toast{left:12px;right:12px;bottom:12px;text-align:center}
}
</style>
</head>
<body>
<div class="intro">
  <div class="intro-card">
    <div class="intro-mark">✦</div>
    <h1>לוח שנה למשניות משפחת זלצמן</h1>
    <p id="introGreeting">ברוכים הבאים</p>
  </div>
</div>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <h1>לוח שנה למשניות משפחת זלצמן</h1>
      <small id="topGreeting">ברוכים הבאים</small>
    </div>
    <nav class="tabs" aria-label="ניווט">
      <button class="tab active" data-page="homePage">דף הבית</button>
      <button class="tab" data-page="calendarPage">כל הלוח</button>
      <button class="tab" data-page="actionsPage">פעולות</button>
      <button class="tab" data-page="settingsPage">הגדרות</button>
    </nav>
    <div class="date-time" id="dateTime">--</div>
  </div>
</header>

<div class="app">
  <section class="page active" id="homePage">
    <div class="home-hero">
      <div class="home-main">
        <div class="home-kicker" id="homeKicker">דף הבית</div>
        <h2 id="homeTitle">היום</h2>
        <p class="home-learning" id="homeLearning">היום לומדים:</p>
        <div class="home-meta" id="homeMeta"></div>
        <div class="actions-row">
          <button class="btn primary" onclick="openToday()">פתח את היום</button>
          <button class="btn" onclick="markToday()">סמן כנלמד</button>
          <button class="btn" onclick="showPage('calendarPage')">כל הלוח</button>
        </div>
      </div>
      <aside class="home-side">
        <h3>מפת סימונים</h3>
        <p class="muted">לחיצה על יום פותחת את פרטי הלימוד.</p>
        <div class="progress"><span id="progressFill"></span></div>
        <div class="stats">
          <div class="stat"><b id="doneCount">0</b><span>נלמדו</span></div>
          <div class="stat"><b id="leftCount">0</b><span>נותרו</span></div>
          <div class="stat"><b id="percentCount">0%</b><span>הושלם</span></div>
        </div>
        <div class="year-map" id="yearMap"></div>
      </aside>
    </div>
  </section>

  <section class="page" id="calendarPage">
    <div class="panel">
      <h3>כל הלוח</h3>
      <div class="toolbar">
        <input class="search" id="search" placeholder="חיפוש לפי תאריך, יום או פרקים..." oninput="renderCalendar()">
        <button class="btn" onclick="clearSearch()">נקה</button>
      </div>
      <div id="calendar"></div>
    </div>
  </section>

  <section class="page" id="actionsPage">
    <div class="panel">
      <h3>פעולות</h3>
      <p class="muted">סימון מרוכז של שבועות וחודשים שלמים.</p>
      <div class="form-grid">
        <div class="form-row">
          <label>בחר שבוע לפי פרשה / שבת</label>
          <select id="weekSelect"></select>
          <div class="actions-row">
            <button class="btn primary" onclick="markRange('week', true)">סמן שבוע כנלמד</button>
            <button class="btn danger" onclick="markRange('week', false)">בטל סימון שבוע</button>
          </div>
        </div>
        <div class="form-row">
          <label>בחר חודש עברי</label>
          <select id="monthSelect"></select>
          <div class="actions-row">
            <button class="btn primary" onclick="markRange('month', true)">סמן חודש כנלמד</button>
            <button class="btn danger" onclick="markRange('month', false)">בטל סימון חודש</button>
          </div>
        </div>
      </div>
      <div class="actions-row">
        <button class="btn" onclick="window.print()">הדפס / PDF</button>
        <button class="btn danger" onclick="clearAllDone()">איפוס כל הסימונים</button>
      </div>
    </div>
  </section>

  <section class="page" id="settingsPage">
    <div class="panel">
      <h3>הגדרות</h3>
      <div class="form-grid">
        <div class="form-row">
          <label>שם המשתמש</label>
          <input id="nameInput" placeholder="הכנס שם">
          <button class="btn primary" onclick="saveName()">שמור שם</button>
        </div>
        <div class="form-row">
          <label>מראה</label>
          <button class="btn" onclick="toggleTheme()">החלף מצב כהה / בהיר</button>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="modal" id="modal" onclick="if(event.target.id==='modal') closeModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h2 id="modalTitle"></h2>
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <div id="modalBody"></div>
    <div class="actions-row">
      <button class="btn primary" id="modalDoneBtn">סמן כנלמד</button>
      <button class="btn" onclick="closeModal()">סגור</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">הפעולה בוצעה</div>

const STORAGE_PREFIX = "zaltsman_mishnayos_";
const todayIsoReal = new Date().toISOString().slice(0,10);
let currentToday = DATA.find(x=>x.iso===todayIsoReal) || DATA[0];

function $(id){return document.getElementById(id)}
function getDone(){try{return JSON.parse(localStorage.getItem(STORAGE_PREFIX+"done")||"{}")}catch(e){return {}}}
function setDone(obj){localStorage.setItem(STORAGE_PREFIX+"done", JSON.stringify(obj))}
function getName(){return localStorage.getItem(STORAGE_PREFIX+"name") || "משתמש"}
function showToast(msg="הפעולה בוצעה"){const t=$("toast");t.textContent=msg;t.classList.add("show");clearTimeout(window.__toast);window.__toast=setTimeout(()=>t.classList.remove("show"),1800)}
function escapeHtml(s){return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function greeting(){
  const h = new Date().getHours();
  if(h>=5 && h<12) return "בוקר טוב";
  if(h>=12 && h<17) return "צהריים טובים";
  if(h>=17 && h<22) return "ערב טוב";
  return "לילה טוב";
}
function updateGreeting(){
  const name=getName();
  $("introGreeting").textContent = `${greeting()}, ${name}`;
  $("topGreeting").textContent = `${greeting()}, ${name}`;
}
function updateClock(){
  const now = new Date();
  const date = now.toLocaleDateString("he-IL", {weekday:"long", year:"numeric", month:"long", day:"numeric"});
  const time = now.toLocaleTimeString("he-IL", {hour:"2-digit", minute:"2-digit", second:"2-digit"});
  $("dateTime").innerHTML = `<b>${time}</b><small>${date} · השעה כעת</small>`;
}
setInterval(updateClock,1000);
function displayDate(item){return `${item.hdate} · ${new Date(item.iso).toLocaleDateString("he-IL")}`}
function dayText(item){return `${item.day} · ${displayDate(item)}`}
function hebrewMonth(hdate){return (hdate.match(/(?:ניסן|אייר|סיון|תמוז|אב|אלול|תשרי|חשון|כסלו|טבת|שבט|אדר)(?:\s+[א-ת״׳]+)?/)||[""])[0]}
function cleanWeekName(day){return String(day).replace(/^שבת\s*[–-]?\s*/,'').trim()}
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.page===id));
  $(id).classList.add("active");
  window.scrollTo({top:0,behavior:"smooth"});
  if(id==="calendarPage") renderCalendar();
}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>showPage(t.dataset.page)));
function renderToday(){
  const item=currentToday;
  $("homeKicker").textContent = dayText(item);
  $("homeTitle").textContent = `${greeting()}, ${getName()}`;
  $("homeLearning").textContent = `היום לומדים: ${item.chapters}`;
  $("homeMeta").textContent = `יום ${item.idx} מתוך ${DATA.length}`;
}
function makeCard(item){
  const done = !!getDone()[item.idx];
  const isToday = item.idx===currentToday.idx;
  return `<article class="card ${done?'done':''} ${isToday?'today':''}">
    <h4>${isToday?'היום · ':''}${escapeHtml(item.day)}</h4>
    <div class="mini">${escapeHtml(displayDate(item))}</div>
    <p style="margin-top:10px">${escapeHtml(item.chapters)}</p>
    <div class="card-buttons">
      <button class="btn small primary" onclick="openDay(${item.idx})">פתח</button>
      <button class="btn small" onclick="toggleDone(${item.idx})">${done?'בטל סימון':'סמן כנלמד'}</button>
    </div>
  </article>`;
}
function renderCalendar(){
  const q = ($("search")?.value || "").trim();
  let rows = DATA.filter(x => !q || [x.idx,x.iso,x.hdate,x.day,x.chapters].join(" ").includes(q));
  const groups = {};
  rows.forEach(x=>{const key = hebrewMonth(x.hdate) || "ללא חודש"; (groups[key] ||= []).push(x);});
  $("calendar").innerHTML = Object.entries(groups).map(([month,items])=>`<section class="month"><div class="month-head"><h3>${month}</h3><span class="pill">${items.length} ימים</span></div><div class="cards">${items.map(makeCard).join("")}</div></section>`).join("") || `<p class="muted">לא נמצאו תוצאות.</p>`;
}
function clearSearch(){$("search").value="";renderCalendar()}
function updateProgress(){
  const done=getDone();
  const n=DATA.filter(x=>done[x.idx]).length;
  const left=DATA.length-n;
  const pct=Math.round(n/DATA.length*100);
  $("doneCount").textContent=n;$("leftCount").textContent=left;$("percentCount").textContent=pct+"%";$("progressFill").style.width=pct+"%";
  $("yearMap").innerHTML=DATA.map(x=>`<button type="button" onclick="openDay(${x.idx})" data-tip="${escapeHtml(dayText(x))}\A${escapeHtml(x.chapters)}" title="${escapeHtml(dayText(x)+' | '+x.chapters)}" class="dot ${done[x.idx]?'done':''} ${x.idx===currentToday.idx?'today':''}"></button>`).join("");
}
function toggleDone(idx){const done=getDone();done[idx] ? delete done[idx] : done[idx]=true;setDone(done);refresh();showToast("הפעולה בוצעה")}
function markToday(){const done=getDone();done[currentToday.idx]=true;setDone(done);refresh();showToast("היום סומן כנלמד")}
function openToday(){openDay(currentToday.idx)}
function openDay(idx){
  const item=DATA.find(x=>x.idx===idx); if(!item) return;
  $("modalTitle").textContent = `יום ${item.idx}`;
  $("modalBody").innerHTML = `<p class="home-learning" style="font-size:24px">היום לומדים: ${escapeHtml(item.chapters)}</p><div class="meta"><span class="pill">${escapeHtml(dayText(item))}</span></div><p class="muted" style="line-height:1.8;margin-top:18px">כאן אפשר להוסיף בעתיד קישור לקריאה רצופה או את הטקסט המלא.</p>`;
  $("modalDoneBtn").onclick=()=>{const d=getDone();d[item.idx]=true;setDone(d);refresh();closeModal();showToast("היום סומן כנלמד")};
  $("modal").classList.add("open");
}
function closeModal(){$("modal").classList.remove("open")}
function setupActions(){
  const weekSel=$("weekSelect"); weekSel.innerHTML="";
  for(let i=0;i<DATA.length;i+=7){
    const items=DATA.slice(i,i+7);
    const shabbos = items.find(x=>String(x.day).includes("שבת"));
    const labelBase = shabbos ? cleanWeekName(shabbos.day) : `ימים ${items[0].idx}–${items[items.length-1].idx}`;
    const opt=document.createElement("option");
    opt.value=items.map(x=>x.idx).join(",");
    opt.textContent=`${labelBase} · ימים ${items[0].idx}–${items[items.length-1].idx}`;
    weekSel.appendChild(opt);
  }
  const months={};
  DATA.forEach(x=>{const key=hebrewMonth(x.hdate) || "ללא חודש";(months[key] ||= []).push(x.idx)});
  $("monthSelect").innerHTML=Object.entries(months).map(([k,ids])=>`<option value="${ids.join(",")}">${k}</option>`).join("");
}
function markRange(type,val){
  const sel = type==="week" ? $("weekSelect") : $("monthSelect");
  const ids=sel.value.split(",").map(Number);
  const done=getDone(); ids.forEach(id=> val ? done[id]=true : delete done[id]);
  setDone(done); refresh(); showToast(val ? "הסימון בוצע בהצלחה" : "ביטול הסימון בוצע");
}
function clearAllDone(){if(confirm("לאפס את כל הסימונים?")){setDone({});refresh();showToast("כל הסימונים אופסו")}}
function saveName(){
  const name=$("nameInput").value.trim() || "משתמש";
  localStorage.setItem(STORAGE_PREFIX+"name", name);
  refresh(); showToast("השם נשמר");
}
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem(STORAGE_PREFIX+"theme", document.body.classList.contains("light") ? "light" : "dark");
  showToast("המראה עודכן");
}
function refresh(){updateGreeting();updateClock();renderToday();updateProgress();renderCalendar();$("nameInput").value=getName()}
window.addEventListener("keydown", e=>{if(e.key==="Escape") closeModal(); if(e.key.toLowerCase()==="h") showPage("homePage")})
window.addEventListener("load",()=>{if(localStorage.getItem(STORAGE_PREFIX+"theme")==="light") document.body.classList.add("light");setupActions();refresh();showPage("homePage")});
</script>
</body>
